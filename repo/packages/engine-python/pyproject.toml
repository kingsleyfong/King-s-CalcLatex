[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "kings-calclatex-engine"
version = "0.1.0"
description = "Local math engine for King's CalcLatex Obsidian plugin"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "sympy>=1.12",
    "numpy>=1.26.0",
    "plotly>=5.18.0",
    "pint>=0.23",
]

[project.optional-dependencies]
dev = ["pytest>=7.4.0", "httpx>=0.25.0"]
