name: Release Obsidian Plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build plugin
        run: |
          cd repo-v2
          npm install
          npm run build

      - name: Copy build artifacts to repo root
        run: |
          cp repo-v2/main.js main.js
          cp repo-v2/styles/main.css styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "Release $tag" \
            --generate-notes \
            main.js manifest.json styles.css
